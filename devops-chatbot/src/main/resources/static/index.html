<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 760px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #161b22;
      border-radius: 16px;
      border: 1px solid #30363d;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: #21262d;
      border-bottom: 1px solid #30363d;
    }
    .header-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #238636, #2ea043);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 1rem; font-weight: 600; color: #f0f6fc; }
    .header-text p  { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px; background: #2ea043;
      border-radius: 50%; margin-left: auto; flex-shrink: 0;
      box-shadow: 0 0 6px #2ea043;
    }

    /* ── Messages area ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* ── Message bubbles ── */
    .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 80%; }
    .msg.user  { align-self: flex-end;  flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .msg.user .avatar { background: #1f6feb; }
    .msg.bot  .avatar { background: #238636; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator { display: flex; gap: 4px; padding: 6px 2px; align-items: center; }
    .typing-indicator span {
      width: 7px; height: 7px; background: #8b949e;
      border-radius: 50%; animation: blink 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* ── Quick commands ── */
    .quick-commands {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      flex-wrap: wrap;
      border-top: 1px solid #30363d;
      background: #161b22;
    }
    .quick-btn {
      padding: 5px 12px;
      font-size: 0.75rem;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: transparent;
      color: #8b949e;
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover { border-color: #2ea043; color: #2ea043; background: rgba(46,160,67,0.08); }

    /* ── Input bar ── */
    .chat-input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: #21262d;
      border-top: 1px solid #30363d;
    }
    #userInput {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #userInput:focus { border-color: #2ea043; }
    #userInput::placeholder { color: #484f58; }

    #sendBtn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: #238636;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #sendBtn:hover { background: #2ea043; }
    #sendBtn:active { transform: scale(0.94); }
    #sendBtn:disabled { background: #30363d; cursor: not-allowed; }

    /* ── Sound toggle ── */
    #soundToggle {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-left: auto;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #soundToggle:hover { border-color: #2ea043; color: #2ea043; }
    #soundToggle.muted { opacity: 0.45; }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.78rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>DevOps Assistant</h1>
      <p>AI-powered pipeline & deployment chatbot</p>
    </div>
    <div class="status-dot" title="Online"></div>
    <button id="soundToggle" onclick="toggleSound()" title="Toggle sounds">🔊 Sound</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages">
    <div class="msg bot">
      <div class="avatar">🤖</div>
      <div class="bubble">
        👋 Hello! I'm your DevOps assistant.<br/>
        Try commands like <strong>build project</strong>, <strong>deploy backend</strong>, or <strong>check pipeline status</strong>.
      </div>
    </div>
  </div>

  <!-- Quick command chips -->
  <div class="quick-commands">
    <button class="quick-btn" onclick="sendQuick('build project')">⚙️ build project</button>
    <button class="quick-btn" onclick="sendQuick('deploy backend')">🚀 deploy backend</button>
    <button class="quick-btn" onclick="sendQuick('check pipeline status')">📊 pipeline status</button>
    <button class="quick-btn" onclick="sendQuick('rollback')">↩️ rollback</button>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <input
      id="userInput"
      type="text"
      placeholder="Type a command or question…"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') sendMessage()"
    />
    <button id="sendBtn" onclick="sendMessage()" title="Send">&#10148;</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('chatMessages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  function appendMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = escapeHtml(text).replace(/\n/g, '<br/>');

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg bot';
    wrapper.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function sendMessage() {
    unlockAudio();                        // FIRST: synchronously unlock AudioContext in this gesture
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    soundSend();                          // 🔊 send click
    appendMessage('user', text);
    showTyping();

    // Play command-specific sound immediately
    const tl = text.toLowerCase();
    if (tl.includes('build'))         soundBuild();
    else if (tl.includes('deploy'))   soundDeploy();
    else if (tl.includes('status'))   soundSuccess();
    else if (tl.includes('rollback')) soundRollback();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      const reply = data.reply || 'No response received.';
      appendMessage('bot', reply);
      playSoundForMessage(reply);         // 🔊 bot reply sound (based on content)
    } catch (err) {
      removeTyping();
      soundError();                       // 🔊 error buzz
      appendMessage('bot', '⚠️ Could not reach the server. Please make sure the backend is running.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function sendQuick(text) {
    unlockAudio(); // synchronous – this IS a user gesture (button click)
    inputEl.value = text;
    sendMessage();
  }

  inputEl.focus();

  // ══════════════════════════════════════════════════════
  // SOUND ENGINE  (Web Audio API – zero external files)
  //
  // KEY RULE: browsers suspend AudioContext until a real
  // user gesture occurs.  unlockAudio() MUST be called
  // synchronously (not inside a Promise/async) at the top
  // of every click/keydown handler that wants sound.
  // All tones are scheduled 80 ms ahead so the context
  // has time to transition to 'running' before they play.
  // ══════════════════════════════════════════════════════
  let audioCtx    = null;
  let soundEnabled = true;
  const AHEAD = 0.08; // seconds – schedule buffer

  // Call this SYNCHRONOUSLY inside any user-gesture handler.
  function unlockAudio() {
    try {
      if (!audioCtx)
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume(); // fire-and-forget is fine here
    } catch (e) {}
  }

  function playTone(freq, type, duration, gainVal, extraDelay) {
    if (!soundEnabled || !audioCtx) return;
    try {
      const t0  = audioCtx.currentTime + AHEAD + (extraDelay || 0);
      const t1  = t0 + (duration || 0.18);
      const osc = audioCtx.createOscillator();
      const vol = audioCtx.createGain();
      osc.connect(vol);
      vol.connect(audioCtx.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      vol.gain.setValueAtTime(0.001, t0);
      vol.gain.linearRampToValueAtTime(gainVal || 0.2, t0 + 0.015);
      vol.gain.exponentialRampToValueAtTime(0.001, t1);
      osc.start(t0);
      osc.stop(t1 + 0.05);
    } catch (e) {}
  }

  // ✉️ Send – two soft clicks
  function soundSend() {
    playTone(520, 'sine', 0.08, 0.18, 0);
    playTone(660, 'sine', 0.08, 0.18, 0.07);
  }

  // ⚙️ Build – ascending mechanical blips
  function soundBuild() {
    [300, 420, 560, 700].forEach((f, i) => playTone(f, 'square', 0.12, 0.12, i * 0.10));
  }

  // 🚀 Deploy – rocket whoosh (frequency sweep)
  function soundDeploy() {
    if (!soundEnabled || !audioCtx) return;
    try {
      const t0  = audioCtx.currentTime + AHEAD;
      const osc = audioCtx.createOscillator();
      const vol = audioCtx.createGain();
      osc.connect(vol);
      vol.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(800, t0);
      osc.frequency.exponentialRampToValueAtTime(150, t0 + 0.5);
      vol.gain.setValueAtTime(0.22, t0);
      vol.gain.exponentialRampToValueAtTime(0.001, t0 + 0.5);
      osc.start(t0);
      osc.stop(t0 + 0.55);
    } catch (e) {}
  }

  // 📊 Status / success – cheerful ding ding ding
  function soundSuccess() {
    [523, 659, 784].forEach((f, i) => playTone(f, 'sine', 0.22, 0.22, i * 0.13));
  }

  // ↩️ Rollback – low warning beeps
  function soundRollback() {
    [330, 262].forEach((f, i) => playTone(f, 'triangle', 0.18, 0.2, i * 0.2));
  }

  // ⚠️ Error – harsh buzz
  function soundError() {
    playTone(180, 'sawtooth', 0.3, 0.25, 0);
  }

  // 🤖 Bot reply – gentle pop
  function soundBotReply() {
    playTone(880, 'sine', 0.1, 0.14, 0);
  }

  // Route sound to matching function based on bot reply text
  function playSoundForMessage(text) {
    const t = text.toLowerCase();
    if (t.includes('build'))    { soundBuild();    return; }
    if (t.includes('deploy'))   { soundDeploy();   return; }
    if (t.includes('status') || t.includes('success') || t.includes('successful'))
                                { soundSuccess();  return; }
    if (t.includes('rollback')) { soundRollback(); return; }
    soundBotReply();
  }

  // Sound toggle button
  function toggleSound() {
    unlockAudio(); // must be synchronous inside click handler
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('soundToggle');
    btn.textContent = soundEnabled ? '🔊 Sound' : '🔇 Muted';
    btn.classList.toggle('muted', !soundEnabled);
    showToast(soundEnabled ? 'Sound ON' : 'Sound OFF');
    if (soundEnabled) playTone(660, 'sine', 0.12, 0.15, 0);
  }

  // Toast notification
  let toastTimer;
  function showToast(msg) {
    let t = document.querySelector('.toast');
    if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }
</script>

</body>
</html>
