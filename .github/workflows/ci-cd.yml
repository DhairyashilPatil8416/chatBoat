name: CI/CD Pipeline – DevOps Chatbot

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Allows the chatbot to trigger real builds via GitHub API
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment target (blank = build only)'
        required: false
        default: ''

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 – Build & Test
  # ──────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for quick verification)
        working-directory: devops-chatbot
        run: mvn clean package -DskipTests

      - name: Run unit tests
        working-directory: devops-chatbot
        run: mvn test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-chatbot-jar
          path: devops-chatbot/target/*.jar
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 2 – Deploy (runs only on push to main/master)
  # Requires GitHub Secrets:
  #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
  #   AWS_REGION, EC2_HOST, EC2_USER, EC2_SSH_KEY
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: devops-chatbot
        run: mvn clean package -DskipTests

      - name: Check EC2 secrets are configured
        id: check_secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || [ -z "${{ secrets.EC2_USER }}" ] || [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  EC2 secrets not configured. Skipping deploy."
            echo "   Add EC2_HOST, EC2_USER and EC2_SSH_KEY in repo Settings → Secrets → Actions."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy JAR to EC2 via SSH
        if: steps.check_secrets.outputs.configured == 'true'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > key.pem
          chmod 600 key.pem
          # Copy JAR to EC2
          scp -o StrictHostKeyChecking=no -i key.pem \
            devops-chatbot/target/devops-chatbot-*.jar \
            $EC2_USER@$EC2_HOST:/home/$EC2_USER/devops-chatbot.jar
          # Restart the application on EC2
          ssh -o StrictHostKeyChecking=no -i key.pem $EC2_USER@$EC2_HOST << 'EOF'
            pkill -f 'devops-chatbot' || true
            nohup java -jar /home/$USER/devops-chatbot.jar \
              --server.port=8080 \
              > /home/$USER/app.log 2>&1 &
            echo "Deployment successful. App running on port 8080."
          EOF
          rm -f key.pem

      - name: Deploy skipped – secrets not set
        if: steps.check_secrets.outputs.configured != 'true'
        run: echo "Deploy skipped. Configure EC2 secrets to enable automatic deployment."
